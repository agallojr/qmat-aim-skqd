# Small SIAM — Co 3d in Cu, 1 imp × 5 bath = 6 orbs / 12 qubits.
# Matches qc-dft-dmft tests/run_qla.sh.

[global]
_output_dir = "~/output"
_script = "python src/run-skqd.py"
_inject_outdir = "--output-dir"

"--system-label" = "Co 3d in Cu"
"--num-imp-orbs" = 1
"--num-bath-per-imp" = 5
"--krylov-dim" = 3
"--dt-mult" = 1.0
"--opt-level" = 1
"--onsite" = 2.0
"--mu" = 1.0
"--hybridization" = 1.0
"--max-iter" = 10
"--num-batches" = 5
"--samples-per-batch" = 300
"--backend-type" = "sim"
"--coupling-map" = "default"
_final_postproc = ["python src/plot_convergence.py"]

[statevector]
"--shots" = 0

[sampled]
"--shots" = [5000, 16384]
