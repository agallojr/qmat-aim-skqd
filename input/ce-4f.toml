# Ce 4f multi-orbital AIM — 3 f-orbital triplet (t₂g-like)
#
# Cerium 4f impurity in a metallic host (e.g. CeCoIn₅).
# Multi-orbital Anderson impurity model with Kanamori interactions:
#   U   = 6.0 eV    intra-orbital Coulomb (4f-4f)
#   U'  = 4.6 eV    inter-orbital Coulomb (U - 2*J_H)
#   J_H = 0.7 eV    Hund's exchange coupling
#   mu  = 3.0 eV    chemical potential
#   V   = 0.5 eV    4f-conduction hybridization
#
# Crystal field: cubic splitting of the 3 t₂g-like orbitals
#   ε = [-0.1, 0.0, +0.1] eV  (slight trigonal distortion)
#
# 3 impurity orbitals × (1 + 1 bath each) = 6 spatial orbitals = 12 qubits
#
# Run with: q8020-sweep input/ce-4f.toml

[global]
_output_dir = "~/output"
_script = "python src/run-skqd.py"
_inject_outdir = "--output-dir"

# System identification
"--system-label" = "Ce 4f"
# Multi-orbital mode
"--num-imp-orbs" = 3
"--num-bath-per-imp" = 1
# Kanamori interactions
"--onsite" = 6.0
"--U-prime" = 4.6
"--J-H" = 0.7
"--mu" = 3.0
"--hybridization" = 0.5
"--crystal-field" = "-0.1,0.0,0.1"
# Krylov / circuit params
"--krylov-dim" = 3
"--dt-mult" = 1.0
"--opt-level" = 1
# SQD post-processing
"--max-iter" = 15
"--num-batches" = 5
"--samples-per-batch" = 300
# Backend
"--backend-type" = "sim"
"--coupling-map" = "default"
# Post-sweep convergence plot
_final_postproc = ["python src/plot_convergence.py"]

[statevector]
"--shots" = 0

[sampled]
"--shots" = [1000, 5000, 16384]
