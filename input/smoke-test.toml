# Smoke test — SIAM Co 3d in Cu, 1 imp × 3 bath = 4 orbs / 8 qubits.

[global]
_output_dir = "~/q8020"
_script = "python src/run-skqd.py"
_inject_outdir = "--output-dir"

"--system-label" = "Co 3d in Cu"
"--num-imp-orbs" = 1
"--num-bath-per-imp" = 3
"--krylov-dim" = 3
"--dt-mult" = 1.0
"--opt-level" = 1
"--onsite" = 4.0
"--mu" = 2.0
"--hybridization" = 0.8
"--max-iter" = 5
"--num-batches" = 3
"--samples-per-batch" = 100
"--backend-type" = "sim"
"--coupling-map" = "default"
_final_postproc = ["python src/plot_convergence.py"]

[statevector]
"--shots" = 0

[sampled]
"--shots" = [1024, 4096]
